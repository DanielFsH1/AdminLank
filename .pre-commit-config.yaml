repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - "--exclude-files"
          - "^dashboard/package-lock\\.json$"
          - "--exclude-lines"
          - "example|placeholder|test|dummy|fake|isPasswordShared|updates\\.password|secretDocId|linked vault secret|microsoft365"
